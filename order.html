<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Order Now</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

.container {
    max-width: 500px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: orange;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: darkorange;
}
</style>

</head>

<body>

<div class="container">
    <h2>🛒 Order Form</h2>

    <!-- এখানে email already বসানো আছে -->
    <form action="https://formsubmit.co/mdkhanrh@gmail.com" method="POST">

        <input type="text" name="name" placeholder="আপনার নাম" required>

        <input type="text" name="phone" placeholder="মোবাইল নাম্বার" required>

        <input type="text" name="product" placeholder="প্রোডাক্ট নাম" required>

        <input type="text" name="address" placeholder="ঠিকানা" required>

        <textarea name="note" placeholder="অতিরিক্ত কিছু লিখুন"></textarea>

        <button type="submit">অর্ডার করুন</button>

    </form>
</div>

</body>
</html>
