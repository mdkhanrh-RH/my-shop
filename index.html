<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>My Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    nav {
      background: #131921;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .hero {
      height: 90vh;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 50px;
      margin: 10px;
    }

    .hero p {
      font-size: 20px;
    }

    .btn {
      margin-top: 20px;
      padding: 15px 30px;
      background: orange;
      color: black;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      width: 200px;
      border: 1px solid #ddd;
      padding: 15px;
      text-align: center;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <nav>🛒 My Shop</nav>

  <div class="hero">
    <h1>Welcome to My Store</h1>
    <p>Best deals everyday 🔥</p>

    <!-- IMPORTANT BUTTON -->
    <a href="order.html">
      <button class="btn">Shop Now</button>
    </a>
  </div>

  <div class="products">
    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product 1</h3>
      <p>৳500</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product 2</h3>
      <p>৳700</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200" alt="Product">
      <h3>Product 3</h3>
      <p>৳900</p>
    </div>
  </div>

</body>
</html>
