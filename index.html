<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>My Shop BD</title>

<style>
body { margin:0; font-family:Arial; }

nav {
  background:#131921;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

nav input {
  padding:5px;
}

.hero {
  text-align:center;
  padding:60px;
  background:linear-gradient(to right, #4facfe, #00f2fe);
  color:white;
}

.btn {
  background:orange;
  padding:10px 20px;
  border:none;
  cursor:pointer;
}

.products {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px;
}

.card {
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

.card img {
  width:100%;
}

</style>
</head>

<body>

<nav>
  <h2>🛒 My Shop</h2>
  <input type="text" placeholder="Search product...">
</nav>

<div class="hero">
  <h1>Welcome to My Store</h1>
  <p>Best deals everyday 🔥</p>
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Shoe</h3>
    <p>৳1500</p>
    <a href="order.html"><button class="btn">Order Now</button></a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Watch</h3>
    <p>৳2000</p>
    <a href="order.html"><button class="btn">Order Now</button></a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Phone</h3>
    <p>৳15000</p>
    <a href="order.html"><button class="btn">Order Now</button></a>
  </div>

</div>

</body>
</html>
