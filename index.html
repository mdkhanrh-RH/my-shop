 <!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>My Shop</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* Navbar */
nav {
    background: #131921;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav input {
    padding: 8px;
    width: 40%;
    border-radius: 5px;
    border: none;
}

nav button {
    padding: 8px 15px;
    background: orange;
    border: none;
    border-radius: 5px;
}

/* Banner */
.banner {
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align: center;
    padding: 80px 20px;
    color: white;
}

/* Products */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card button {
    background: orange;
    border: none;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
}

/* Footer */
footer {
    background: #131921;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav>
    <h2>🛒 My Shop</h2>
    <input type="text" placeholder="Search product...">
    <button>Search</button>
</nav>

<!-- Banner -->
<div class="banner">
    <h1>Welcome to My Store</h1>
    <p>Best deals everyday 🔥</p>
</div>

<!-- Products -->
<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Smart Watch</h3>
        <p>৳1500</p>
        <button onclick="order()">Order Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Headphone</h3>
        <p>৳800</p>
        <button onclick="order()">Order Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Mobile</h3>
        <p>৳12000</p>
        <button onclick="order()">Order Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200">
        <h3>Laptop</h3>
        <p>৳45000</p>
        <button onclick="order()">Order Now</button>
    </div>

</div>

<!-- Footer -->
<footer>
    <p>© 2026 My Shop | All rights reserved</p>
</footer>

<script>
function order() {
    window.location.href = "order.html";
}
</script>

</body>
</html>
